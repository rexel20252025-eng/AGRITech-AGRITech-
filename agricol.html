<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AGRITech— Mes Machines</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep:  #0d3320;
      --green:       #1a5c38;
      --green-mid:   #2d8a56;
      --green-light: #4db87a;
      --green-pale:  #e8f7ef;
      --gold:        #c9933a;
      --gold-light:  #f2c96e;
      --text:        #0d1f15;
      --muted:       #5a7a65;
      --bg:          #f2faf5;
      --card:        #ffffff;
      --border:      #cce8d8;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding-bottom: 100px;
      color: var(--text);
    }
    .header {
      background: var(--green-deep);
      padding: 0 0 18px;
      position: relative; overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 85% -10%, rgba(77,184,122,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(201,147,58,0.15) 0%, transparent 60%);
    }
    .header::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px; border-radius: 50%;
      border: 1px solid rgba(77,184,122,0.1);
      top: -50px; right: -50px;
    }
    .header-inner { padding: 28px 20px 14px; position: relative; z-index: 2; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .page-eyebrow {
      font-size: 0.6rem; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--green-light);
      display: flex; align-items: center; gap: 7px; margin-bottom: 6px;
    }
    .page-eyebrow::before { content: ''; width: 18px; height: 1.5px; background: var(--green-light); display: inline-block; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1.1; }
    .page-title em {
      font-style: italic;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .solde-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); border-radius: 14px; padding: 10px 14px; text-align: right; }
    .solde-lbl { font-size: 0.56rem; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
    .solde-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold-light); margin-top: 2px; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 8px; text-align: center; position: relative; overflow: hidden; }
    .stat-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--green-light), transparent); opacity: 0.4; }
    .sb-num { font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 700; color: #fff; display: block; word-break: break-word; line-height: 1.2; }
    .sb-lbl { font-size: 0.55rem; font-weight: 500; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.4px; }
    .sec { padding: 16px 20px 10px; display: flex; align-items: center; gap: 12px; }
    .sec h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); white-space: nowrap; }
    .sec-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
    .loading { text-align: center; padding: 60px 20px; }
    .loader { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--green-mid); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 0.82rem; color: var(--muted); }
    .empty { text-align: center; padding: 70px 30px; display: none; }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .go-invest { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); color: white; text-decoration: none; padding: 14px 28px; border-radius: 50px; font-size: 0.88rem; font-weight: 700; box-shadow: 0 8px 24px rgba(26,92,56,0.28); }

    /* ── CARDS ── */
    .cards { padding: 0 14px; display: flex; flex-direction: column; gap: 14px; }
    .inv-card { background: var(--card); border-radius: 18px; border: 1.5px solid var(--border); overflow: hidden; box-shadow: 0 3px 14px rgba(13,51,32,0.07); animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    /* Banner réduit */
    .card-banner { position: relative; height: 100px; overflow: hidden; }
    .card-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(13,51,32,0.05) 0%, rgba(13,51,32,0.65) 100%); }
    .banner-labels { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .s-pill { padding: 3px 9px; border-radius: 20px; font-size: 0.57rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; }
    .s-active { background: rgba(77,184,122,0.88); color: white; }
    .s-done   { background: rgba(201,147,58,0.88); color: white; }

    /* Progression réduite */
    .card-prog { padding: 10px 14px 3px; }
    .prog-head { display: flex; justify-content: space-between; font-size: 0.64rem; font-weight: 600; margin-bottom: 6px; }
    .ph-left { color: var(--green-mid); }
    .ph-right { color: var(--muted); }
    .prog-track { height: 6px; background: var(--green-pale); border-radius: 10px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--green), var(--green-light)); position: relative; overflow: hidden; }
    .prog-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: glide 2.2s ease-in-out infinite; }
    @keyframes glide { 0% { transform:translateX(-100%); } 100% { transform:translateX(200%); } }

    /* Métriques : 4 colonnes compactes */
    .card-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px 12px; }
    .metric { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 7px 5px; text-align: center; }
    .m-icon { font-size: 0.78rem; margin-bottom: 2px; display: block; }
    .m-lbl { font-size: 0.52rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 1px; }
    .m-val { font-family: 'Playfair Display', serif; font-size: 0.75rem; font-weight: 700; color: var(--text); }
    .m-val.g { color: var(--green-mid); }
    .m-val.o { color: var(--gold); }
    .m-val.b { color: #2d7abf; font-size: 0.68rem; }

    /* Footer boutons */
    .card-foot { padding: 5px 12px 14px; }
    .btn-collect { width: 100%; border: none; background: none; cursor: pointer; border-radius: 14px; padding: 0; display: block; }
    .bci { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: linear-gradient(135deg, #0d3320 0%, #1a5c38 50%, #2d8a56 100%); border-radius: 14px; position: relative; overflow: hidden; transition: transform 0.15s, box-shadow 0.2s; box-shadow: 0 5px 20px rgba(13,51,32,0.3); }
    .btn-collect:active .bci { transform: scale(0.97); box-shadow: 0 2px 10px rgba(13,51,32,0.2); }
    .bci::before { content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.1) 50%, transparent 65%); animation: sweep 2.8s ease-in-out infinite; }
    @keyframes sweep { 0% { transform:translateX(-120%); } 100% { transform:translateX(120%); } }
    .bci-icon-wrap { width: 34px; height: 34px; background: rgba(255,255,255,0.12); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; position: relative; }
    .bci-icon-wrap::after { content: ''; position: absolute; inset: -3px; border-radius: 13px; border: 1.5px solid rgba(255,255,255,0.2); animation: pulse-ring 2s ease-in-out infinite; }
    @keyframes pulse-ring { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:0.2;transform:scale(1.12);} }
    .bci-left { display: flex; align-items: center; gap: 10px; }
    .bci-text-main { font-size: 0.82rem; font-weight: 700; color: white; display: block; }
    .bci-text-sub  { font-size: 0.6rem; color: rgba(255,255,255,0.6); display: block; margin-top: 1px; }
    .bci-amount { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 6px 11px; font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 700; color: var(--gold-light); flex-shrink: 0; }
    .btn-wait { width: 100%; border: 1.5px solid var(--border); background: var(--bg); border-radius: 14px; padding: 12px 15px; cursor: not-allowed; display: flex; align-items: center; gap: 10px; }
    .bw-icon { font-size: 1rem; flex-shrink: 0; }
    .bw-main { font-size: 0.78rem; font-weight: 700; color: var(--text); display: block; }
    .bw-sub  { font-size: 0.63rem; color: var(--muted); display: block; margin-top: 1px; }
    .btn-done { width: 100%; border: none; border-radius: 14px; padding: 12px 15px; cursor: not-allowed; background: linear-gradient(135deg, #5a4000, var(--gold)); display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 700; }

    .notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-90px); background: linear-gradient(135deg, var(--green), var(--green-light)); color: white; padding: 13px 22px; border-radius: 50px; font-size: 0.84rem; font-weight: 700; z-index: 9999; white-space: nowrap; box-shadow: 0 8px 30px rgba(26,92,56,0.35); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s; opacity: 0; pointer-events: none; }
    .notif.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .notif.err  { background: linear-gradient(135deg, #7f0000, #c62828); }

    /* ── NAV (inchangée) ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1.5px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding: 8px 0 14px; z-index: 100; box-shadow: 0 -4px 20px rgba(45,106,79,0.08); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 16px; border-radius: 12px; transition: all 0.2s; text-decoration: none; }
    .nav-icon { transition: transform 0.2s; color: #aac4b0; }
    .nav-label { font-size: 0.6rem; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; }
    .nav-item.active .nav-label { color: var(--green); font-weight: 700; }
    .nav-item.active .nav-icon { transform: scale(1.15); color: var(--green); }
    .nav-dot { width: 4px; height: 4px; background: var(--green); border-radius: 50%; display: none; }
    .nav-item.active .nav-dot { display: block; }
  </style>
</head>

<script type="module">
  import { initializeApp }     from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAnalytics }      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import { getDatabase, ref, get, update, onValue }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDaFEepJKO8TbePfgnYlX0N3-CcaV75fy4",
    authDomain: "agri-5af15.firebaseapp.com",
    databaseURL: "https://agri-5af15-default-rtdb.firebaseio.com",
    projectId: "agri-5af15",
    storageBucket: "agri-5af15.firebasestorage.app",
    messagingSenderId: "1010902928190",
    appId: "1:1010902928190:web:57d2555d69e2c023057a6f",
    measurementId: "G-XYB13DQZSP"
  };

  const app       = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth      = getAuth(app);
  const db        = getDatabase(app);

  const IMGS = {
    1: "https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=600&fit=crop",
    2: "https://images.unsplash.com/photo-1560493676-04071c5f467b?w=600&fit=crop",
    3: "https://images.unsplash.com/photo-1599058917765-a780eda07a3e?w=600&fit=crop",
    4: "https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=600&fit=crop",
    5: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&fit=crop",
    6: "https://images.unsplash.com/photo-1473973266408-ed4e27abdd47?w=600&fit=crop",
    7: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800&fit=crop",
  };

  const PRODUCT_CONFIG = {
  1: { productId:1, price:5500,   dailyRevenue:1000,  cycleDuration:20, totalRevenue:20000,  limit:1  },
    2: { productId:2, price:10500,  dailyRevenue:2500,  cycleDuration:19, totalRevenue:47500,  limit:1  },
    3: { productId:3, price:18500,  dailyRevenue:4000,  cycleDuration:18, totalRevenue:72000,  limit:1  },
    4: { productId:4, price:35500,  dailyRevenue:8000,  cycleDuration:17, totalRevenue:136000, limit:1  },
    5: { productId:5, price:50000,  dailyRevenue:15000, cycleDuration:16, totalRevenue:240000, limit:5  },
    6: { productId:6, price:100000, dailyRevenue:25400, cycleDuration:14, totalRevenue:355600, limit:5  },
    7: { productId:7, price:200000, dailyRevenue:50000, cycleDuration:5,  totalRevenue:450000, limit:10 }
  };

  let _uid = null;

  function fmt(n) { return new Intl.NumberFormat('fr-FR').format(Math.max(0, Math.floor(n))) + " FCFA"; }

  function fmtDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  }

  function showNotif(msg, err = false) {
    const el = document.getElementById('notif');
    el.textContent = msg;
    el.className = 'notif' + (err ? ' err' : '');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function midnight(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function getAvailable(inv) {
    const cfg   = PRODUCT_CONFIG[inv.productId];
    const cycle = cfg ? cfg.cycleDuration : (inv.remainingDays || 60);
    const daily = cfg ? cfg.dailyRevenue  : (inv.dailyRevenue  || 0);

    const today = midnight(new Date());
    const start = midnight(new Date(inv.startDate));
    const msDay = 86400000;

    const passed        = Math.floor((today - start) / msDay);
    const activeDays    = Math.min(passed, cycle);
    const collectedDays = daily > 0 ? Math.round((inv.totalCollected || 0) / daily) : 0;
    const toCollect     = Math.max(0, activeDays - collectedDays);

    return toCollect * daily;
  }

  function cardFooter(key, inv, available, done) {
    const cfg   = PRODUCT_CONFIG[inv.productId];
    const daily = cfg ? cfg.dailyRevenue : (inv.dailyRevenue || 0);

    if (done) {
      return `<button class="btn-done" disabled>🏁 Cycle terminé &nbsp;·&nbsp; ${fmt(inv.totalCollected || 0)} récoltés</button>`;
    }
    if (available > 0) {
      const days = daily > 0 ? Math.round(available / daily) : 1;
      const sub  = days > 1 ? `${days} jours de bénéfices disponibles` : "Veuillez le récupérer et le retirer";
      return `
        <button class="btn-collect" onclick="window._collect('${key}')">
          <div class="bci">
            <div class="bci-left">
              <div class="bci-icon-wrap">💸</div>
              <div>
                <span class="bci-text-main">Votre bénéfice est prêt</span>
                <span class="bci-text-sub">${sub}</span>
              </div>
            </div>
            <div class="bci-amount">+${fmt(available)}</div>
          </div>
        </button>`;
    }
    return `
      <button class="btn-wait" disabled>
        <span class="bw-icon">⏳</span>
        <div>
          <span class="bw-main">Déjà récupéré aujourd'hui</span>
          <span class="bw-sub">Veuillez revenir demain· +${fmt(daily)} t'attendent</span>
        </div>
      </button>`;
  }

  function buildCard(key, inv, delay) {
    const cfg   = PRODUCT_CONFIG[inv.productId];
    const cycle = cfg ? cfg.cycleDuration : (inv.remainingDays || 60);
    const daily = cfg ? cfg.dailyRevenue  : (inv.dailyRevenue  || 0);

    const today      = midnight(new Date());
    const start      = midnight(new Date(inv.startDate));
    const passed     = Math.floor((today - start) / 86400000);
    const activeDays = Math.min(passed, cycle);
    const left       = Math.max(0, cycle - activeDays);
    const pct        = Math.min(100, Math.round((activeDays / cycle) * 100));
    const done       = inv.status === 'completed' || left === 0;
    const avail      = getAvailable(inv);
    const img        = IMGS[inv.productId] || IMGS[1];
    const dateInvest = fmtDate(inv.startDate);

    return `
      <div class="inv-card" id="card-${key}" style="animation-delay:${delay}s">
        <div class="card-banner">
          <img src="${img}" alt="${inv.productName}" loading="lazy"/>
          <div class="banner-labels">
            <div class="card-name">${inv.productName || 'Machine'}</div>
            <div class="s-pill ${done ? 's-done' : 's-active'}">${done ? '✅ Terminé' : '🟢 Actif'}</div>
          </div>
        </div>
        <div class="card-prog">
          <div class="prog-head">
            <span class="ph-left">${done ? 'Cycle terminé' : left + ' jour' + (left > 1 ? 's' : '') + ' restant' + (left > 1 ? 's' : '')}</span>
            <span class="ph-right">${activeDays}/${cycle} jours</span>
          </div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="card-metrics">
          <div class="metric">
            <span class="m-icon">💰</span>
            <div class="m-lbl">Investi</div>
            <div class="m-val">${fmt(inv.amount)}</div>
          </div>
          <div class="metric">
            <span class="m-icon">📈</span>
            <div class="m-lbl">Par jour</div>
            <div class="m-val g">+${fmt(daily)}</div>
          </div>
          <div class="metric">
            <span class="m-icon">🏆</span>
            <div class="m-lbl">Collecté</div>
            <div class="m-val o">${fmt(inv.totalCollected || 0)}</div>
          </div>
          <div class="metric">
            <span class="m-icon">📅</span>
            <div class="m-lbl">Date</div>
            <div class="m-val b">${dateInvest}</div>
          </div>
        </div>
        <div class="card-foot" id="foot-${key}">
          ${cardFooter(key, inv, avail, done)}
        </div>
      </div>`;
  }

  window._collect = async function(key) {
    if (!_uid) { showNotif("Connectez-vous d'abord", true); return; }
    const foot = document.getElementById('foot-' + key);
    if (foot) foot.innerHTML = `<button class="btn-wait" disabled><span class="bw-icon">⏳</span><div><span class="bw-main">Collecte en cours…</span></div></button>`;

    try {
      const [iSnap, sSnap] = await Promise.all([
        get(ref(db, `investments/${_uid}/${key}`)),
        get(ref(db, `users/${_uid}/balance`))
      ]);
      if (!iSnap.exists()) { showNotif("Investissement introuvable", true); return; }

      const inv   = iSnap.val();
      const solde = sSnap.val() || 0;
      const cfg   = PRODUCT_CONFIG[inv.productId];
      const cycle = cfg ? cfg.cycleDuration : (inv.remainingDays || 60);

      const avail = getAvailable(inv);
      if (avail <= 0) { showNotif("Aucun bénéfice disponible", true); return; }

      const today      = midnight(new Date());
      const start      = midnight(new Date(inv.startDate));
      const passed     = Math.floor((today - start) / 86400000);
      const activeDays = Math.min(passed, cycle);
      const status     = activeDays >= cycle ? 'completed' : 'active';

      await update(ref(db), {
        [`users/${_uid}/balance`]:                     solde + avail,
        [`investments/${_uid}/${key}/totalCollected`]: (inv.totalCollected || 0) + avail,
        [`investments/${_uid}/${key}/lastCollection`]: new Date().toISOString(),
        [`investments/${_uid}/${key}/status`]:         status,
      });

      showNotif(`✅ +${fmt(avail)} ajoutés à votre solde !`);
    } catch (e) {
      console.error(e);
      showNotif("Erreur lors de la collecte", true);
    }
  };

  function updateStats(list) {
    const actives = list.filter(i => i.status === 'active');
    const gains   = actives.reduce((s, i) => {
      const cfg = PRODUCT_CONFIG[i.productId];
      return s + (cfg ? cfg.dailyRevenue : (i.dailyRevenue || 0));
    }, 0);
    const total = list.reduce((s, i) => s + (i.totalCollected || 0), 0);
    document.getElementById('statA').textContent = actives.length || '0';
    document.getElementById('statG').textContent = actives.length ? fmt(gains) : '—';
    document.getElementById('statC').textContent = total > 0 ? fmt(total) : '—';
  }

  async function migrateInvestments(uid, entries) {
    const updates = {};
    for (const [key, inv] of entries) {
      const cfg = PRODUCT_CONFIG[inv.productId];
      if (!cfg) continue;
      if (inv.dailyRevenue  !== cfg.dailyRevenue)  updates['investments/' + uid + '/' + key + '/dailyRevenue']  = cfg.dailyRevenue;
      if (inv.totalRevenue  !== cfg.totalRevenue)  updates['investments/' + uid + '/' + key + '/totalRevenue']  = cfg.totalRevenue;
      if (inv.remainingDays !== cfg.cycleDuration) updates['investments/' + uid + '/' + key + '/remainingDays'] = cfg.cycleDuration;
      if (inv.amount        !== cfg.price)         updates['investments/' + uid + '/' + key + '/amount']        = cfg.price;
    }
    if (Object.keys(updates).length > 0) {
      await update(ref(db), updates);
      console.log('Migration Firebase : ' + Object.keys(updates).length + ' champ(s) mis à jour');
    }
  }

  function listen(uid) {
    onValue(ref(db, `users/${uid}/balance`), s => {
      document.getElementById('soldeVal').textContent = fmt(s.val() || 0);
    });
    onValue(ref(db, `investments/${uid}`), s => {
      document.getElementById('loadWrap').style.display = 'none';
      const wrap = document.getElementById('cardsWrap');
      if (!s.exists()) {
        document.getElementById('emptyWrap').style.display = 'block';
        wrap.innerHTML = '';
        updateStats([]);
        return;
      }
      document.getElementById('emptyWrap').style.display = 'none';
      const entries = Object.entries(s.val()).sort(([, a], [, b]) => {
        if (a.status === 'active' && b.status !== 'active') return -1;
        if (b.status === 'active' && a.status !== 'active') return  1;
        return new Date(b.startDate) - new Date(a.startDate);
      });
      migrateInvestments(uid, entries);
      wrap.innerHTML = entries.map(([k, i], idx) => buildCard(k, i, idx * 0.07)).join('');
      updateStats(entries.map(([, i]) => i));
    });
  }

  onAuthStateChanged(auth, user => {
    if (user) { _uid = user.uid; listen(user.uid); }
    else {
      _uid = null;
      document.getElementById('loadWrap').style.display = 'none';
      document.getElementById('emptyWrap').style.display = 'block';
    }
  });
</script>
</body>
</html>
